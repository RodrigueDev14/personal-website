<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background with gradient -->
    <defs>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#61dafb;stop-opacity:0.2"/>
            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.1"/>
        </linearGradient>
    </defs>
    <rect width="800" height="400" fill="url(#grad2)"/>
    
    <!-- Shopping Cart Icon -->
    <circle cx="400" cy="200" r="80" fill="none" stroke="#61dafb" stroke-width="3"/>
    <circle cx="360" cy="240" r="15" fill="none" stroke="#61dafb" stroke-width="3"/>
    <circle cx="440" cy="240" r="15" fill="none" stroke="#61dafb" stroke-width="3"/>
    <path d="M320 180 L480 180 L460 220 L340 220 Z" fill="none" stroke="#61dafb" stroke-width="3"/>
    
    <!-- Product Cards -->
    <rect x="200" y="150" width="60" height="80" rx="5" fill="none" stroke="#61dafb" stroke-width="2"/>
    <rect x="540" y="150" width="60" height="80" rx="5" fill="none" stroke="#61dafb" stroke-width="2"/>
    
    <!-- Connection Lines -->
    <path d="M270 190 Q400 100 530 190" fill="none" stroke="#61dafb" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- React Symbol -->
    <ellipse cx="400" cy="320" rx="30" ry="10" fill="none" stroke="#61dafb" stroke-width="2" transform="rotate(30 400 320)"/>
    <ellipse cx="400" cy="320" rx="30" ry="10" fill="none" stroke="#61dafb" stroke-width="2" transform="rotate(90 400 320)"/>
    <ellipse cx="400" cy="320" rx="30" ry="10" fill="none" stroke="#61dafb" stroke-width="2" transform="rotate(150 400 320)"/>
</svg>
