<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background with gradient -->
    <defs>
        <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#02c39a;stop-opacity:0.2"/>
            <stop offset="100%" style="stop-color:#00a896;stop-opacity:0.1"/>
        </linearGradient>
    </defs>
    <rect width="800" height="400" fill="url(#grad3)"/>
    
    <!-- Mobile Phone Frame -->
    <rect x="350" y="100" width="100" height="200" rx="10" fill="none" stroke="#02c39a" stroke-width="3"/>
    <rect x="370" y="120" width="60" height="160" rx="5" fill="none" stroke="#02c39a" stroke-width="2"/>
    
    <!-- Fitness Icons -->
    <circle cx="400" cy="150" r="15" fill="none" stroke="#02c39a" stroke-width="2"/>
    <path d="M385 150 L415 150" stroke="#02c39a" stroke-width="2"/>
    <path d="M400 135 L400 165" stroke="#02c39a" stroke-width="2"/>
    
    <!-- Activity Graph -->
    <path d="M380 200 L390 190 L400 210 L410 180 L420 200" fill="none" stroke="#02c39a" stroke-width="2"/>
    
    <!-- Heart Rate Icon -->
    <path d="M385 240 L395 240 L400 230 L405 240 L415 240 L400 255 Z" fill="none" stroke="#02c39a" stroke-width="2"/>
    
    <!-- Flutter Logo -->
    <path d="M300 300 L320 320 L300 340" fill="none" stroke="#02c39a" stroke-width="2"/>
    <path d="M500 300 L480 320 L500 340" fill="none" stroke="#02c39a" stroke-width="2"/>
    
    <!-- Connection Lines -->
    <path d="M320 320 Q400 280 480 320" fill="none" stroke="#02c39a" stroke-width="2" stroke-dasharray="5,5"/>
</svg>
