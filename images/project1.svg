<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Background with gradient -->
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:0.2"/>
            <stop offset="100%" style="stop-color:#357abd;stop-opacity:0.1"/>
        </linearGradient>
    </defs>
    <rect width="800" height="400" fill="url(#grad1)"/>
    
    <!-- AI Brain Network -->
    <circle cx="400" cy="200" r="100" fill="none" stroke="#4a90e2" stroke-width="2"/>
    <circle cx="400" cy="200" r="70" fill="none" stroke="#4a90e2" stroke-width="2"/>
    
    <!-- Neural Network Nodes -->
    <circle cx="300" cy="150" r="10" fill="#4a90e2"/>
    <circle cx="500" cy="150" r="10" fill="#4a90e2"/>
    <circle cx="400" cy="100" r="10" fill="#4a90e2"/>
    <circle cx="400" cy="300" r="10" fill="#4a90e2"/>
    
    <!-- Connection Lines -->
    <line x1="300" y1="150" x2="400" y2="200" stroke="#4a90e2" stroke-width="2"/>
    <line x1="500" y1="150" x2="400" y2="200" stroke="#4a90e2" stroke-width="2"/>
    <line x1="400" y1="100" x2="400" y2="200" stroke="#4a90e2" stroke-width="2"/>
    <line x1="400" y1="300" x2="400" y2="200" stroke="#4a90e2" stroke-width="2"/>
    
    <!-- Binary Data -->
    <text x="250" y="380" font-family="monospace" font-size="14" fill="#4a90e2">
        01001001 01000001
    </text>
</svg>
